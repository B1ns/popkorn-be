# docker-compose.prod.yml
services:
  app:
    build: .
    container_name: popkorn-app
    env_file:
      - .env.prod
    depends_on:
      - postgres
      - redis
    expose:
      - "8000"
    restart: always

  postgres:
    image: postgres:16
    container_name: popkorn-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: popkorn-redis
    restart: always

  nginx:
    image: nginx:alpine
    container_name: popkorn-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    restart: always

volumes:
  postgres_data:
